<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inducción SSOMA – SINBA</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            margin: 0;
            padding: 0;
        }

        header {
            background: #4c2e83;
            padding: 20px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        header img {
            height: 60px;
        }

        h1 {
            margin: 0;
            font-size: 28px;
            letter-spacing: 1px;
        }

        .container {
            max-width: 950px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 25px;
            box-shadow: 0 3px 15px rgba(0,0,0,0.12);
        }

        .card h2 {
            color: #4c2e83;
            margin-top: 0;
            font-size: 22px;
        }

        iframe {
            width: 100%;
            height: 420px;
            border: none;
            border-radius: 8px;
            background: #fafafa;
        }

        .button {
            display: inline-block;
            background: #4c2e83;
            color: white;
            padding: 12px 18px;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            margin-top: 10px;
            text-align: center;
        }

        footer {
            text-align: center;
            padding: 20px 0;
            color: #4c2e83;
            font-size: 14px;
        }
    </style>
</head>

<body>

   <header style="text-align:center; padding:20px; display:block;">
    <img src="sinba.png" alt="Logo SINBA"
         style="max-width:150px; width:40%; height:auto;">

    <h1 style="font-size:clamp(20px, 4vw, 32px); margin:10px 0;">
        Inducción SSOMA – SINBA
    </h1>

    <div style="width:100%; max-width:560px; margin:20px auto;">
        <video
            src="video1.mp4"
            style="width:100%; height:auto; border-radius:15px;"
            autoplay
            loop
            muted
            playsinline
        ></video>
    </div>
</header>

    <div class="container">

        <!-- VIDEO -->
        <div class="card">
            <h2>📹 Video de Inducción</h2>
            <iframe width="560" height="315" src="https://www.youtube.com/embed/FWX8817hLg4?si=BMmbE73Q-OLydst1" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
        </div>
         <!-- REGLAMENTO INTERNO SST -->
        <div class="card">
            <h2>📘 Reglamento Interno de SST</h2>
            <iframe id="reglamento-sst" src="https://docs.google.com/viewer?embedded=true&url="></iframe>
        </div>

        <!-- DIFUSIÓN DE POLÍTICAS -->
        <div class="card">
          <h2>📢 Difusión de Políticas SSOMA</h2>
            <iframe
              id="politicas-sst"
              src="https://drive.google.com/file/d/1adYF3UbMvHSe9i4WSpijdRDgtcGbPiMf/preview"
              width="100%"
              height="600">
            </iframe>
        </div>
        <!-- FORM REGISTRO -->
        <div class="card">
            <h2>📝 Registro de Ingreso</h2>
            <a id="form-registro" class="button" href="https://docs.google.com/forms/d/19XyERKQ0qd9ViXK5BYAt9YpZTWMMeRo6dlo6jRBLgas/viewform?edit_requested=true" target="_blank">Registrarme Aqui</a>
        </div>

        <!-- EXAMEN -->
        <div class="card">
            <h2>🧪 Examen SSOMA</h2>
            <a id="examen-aprobado" class="button" href="https://docs.google.com/forms/d/1llEi3gyEqxeWG3W271tgdrK7nqE2Cc3ph9MemCDnh5w/viewform?edit_requested=true" target="_blank">Ir al examen</a>
        </div>

    
    </div>

    <footer>© SINBA • Sistema de Inducción SSOMA • 2026</footer>

    <script>
        fetch("config.json")
            .then(r => r.json())
            .then(cfg => {
                document.getElementById("video-induccion").src = cfg.video_induccion;
                document.getElementById("form-registro").src = cfg.form_registro;
                document.getElementById("examen-aprobado").href = cfg.examen_aprobado;
                document.getElementById("reglamento-sst").src = cfg.reglamento_sst;
                document.getElementById("politicas-sst").src = cfg.politicas_sst;
            })
            .catch(err => console.error("Error cargando config.json:", err));
    </script>
</body>
</html>
